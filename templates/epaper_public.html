<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Paper</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#eef0f6;color:#111}
body.night{background:#091223;color:#e9efff}
.wrap{max-width:1400px;margin:0 auto;padding:20px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.title{font-size:42px;font-weight:800}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.card{background:#fff;border:1px solid #d7dce8;border-radius:14px;overflow:hidden;text-decoration:none;color:inherit}
body.night .card{background:#111d33;border-color:#2d3d62}
.card img{width:100%;height:220px;object-fit:cover}
.body{padding:12px}
.cat{display:inline-block;background:#dde3ef;padding:4px 8px;border-radius:8px;font-size:13px;font-weight:700}
.headline{margin-top:8px;font-size:20px;line-height:1.35;font-weight:700}
.headline.hi{font-family:'Tiro Devanagari Hindi',serif}
.meta{margin-top:8px;font-size:14px;color:#66708a}
.btn{padding:8px 12px;border:1px solid #a8b2ce;background:#f7f9ff;border-radius:999px;text-decoration:none;color:#1f2f5d;font-weight:700}
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:650px){.grid{grid-template-columns:1fr}.title{font-size:30px}}
</style>
</head>
<body class="{% if theme == 'night' %}night{% endif %}">
<div class="wrap">
  <div class="top">
    <div class="title">{% if lang=='hi' %}ई-पेपर{% else %}E-Paper{% endif %}</div>
    <div style="display:flex;gap:10px">
      <a class="btn" href="/news?{{ urlencode({'lang': lang, 'theme': theme}) }}">Home</a>
      <a class="btn" href="?{{ urlencode({'lang': lang, 'theme': 'day'}) }}">Day</a>
      <a class="btn" href="?{{ urlencode({'lang': lang, 'theme': 'night'}) }}">Night</a>
    </div>
  </div>
  <div class="grid">
    {% for n in items %}
    <a class="card" href="{{ n.detail_url }}&theme={{ theme }}">
      <img src="{{ n.display_image_url }}" alt="">
      <div class="body">
        <span class="cat">{{ n.category }}</span>
        <div class="headline {% if lang=='hi' %}hi{% endif %}">{{ n.display_title }}</div>
        <div class="meta">{{ n.created_at[:10] if n.created_at else '' }}</div>
      </div>
    </a>
    {% endfor %}
  </div>
</div>
</body>
</html>
